# =============================================================================
# docker-compose.prod.yml — 단일 VPS/홈서버 프로덕션 스택
# -----------------------------------------------------------------------------
# 4 services: db(postgres:16-alpine) / backend(FastAPI/Python 3.12) / frontend(next.js) / caddy(reverse proxy + TLS)
# - 환경변수는 .env.prod (git 제외) 에서 주입
# - 외부 노출은 caddy:80/443 만 (backend/frontend/db 는 내부 네트워크 전용)
# - Caddy 가 Let's Encrypt 자동 발급/갱신 (DOMAIN=localhost 일 때는 internal CA)
# - DB 볼륨(signal-prod-data) 영구 보존, Caddy 인증서/설정도 볼륨 보존
# - depends_on 헬스체크로 기동 순서 보장
# - 레거시 Java 백엔드(src/backend/)는 Phase 9 에서 제거 예정
# =============================================================================

name: ted-signal-prod

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: ted-signal-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Seoul
      PGTZ: Asia/Seoul
    volumes:
      - signal-prod-data:/var/lib/postgresql/data
      # 초기 스키마는 backend 컨테이너의 alembic upgrade 가 전담 — initdb 마운트 제거.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - backend-net
    # DB 포트는 외부 노출 금지 (운영자 psql 필요 시 `docker compose exec db psql`)

  # ---------------------------------------------------------------------------
  # Backend (FastAPI / Python 3.12)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./src/backend_py
      dockerfile: Dockerfile
    image: ted-signal-backend:${IMAGE_TAG:-latest}
    container_name: ted-signal-backend
    restart: unless-stopped
    environment:
      APP_ENV: prod
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      # Telegram
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      # KRX (pykrx 로그인 세션용 회원 ID/PW)
      KRX_ID: ${KRX_ID:-}
      KRX_PW: ${KRX_PW:-}
      # DART / OpenAI / KIS (Phase 10~13 도입, 지금은 optional)
      DART_API_KEY: ${DART_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      KIS_APP_KEY_MOCK: ${KIS_APP_KEY_MOCK:-}
      KIS_APP_SECRET_MOCK: ${KIS_APP_SECRET_MOCK:-}
      KIS_ACCOUNT_NO_MOCK: ${KIS_ACCOUNT_NO_MOCK:-}
      # 배치 스케줄러 (프로덕션만 자동 기동)
      SCHEDULER_ENABLED: "true"
      SCHEDULER_HOUR_KST: "6"
      SCHEDULER_MINUTE_KST: "0"
      # CORS: Caddy 동일 도메인 뒤이면 빈 리스트 유지(same-origin)
      CORS_ALLOW_ORIGINS: "[]"
      TZ: Asia/Seoul
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend-net
    # 백엔드 8000 은 내부 네트워크 전용 (프론트엔드 SSR 및 Caddy /api 업스트림)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; r=urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=3); sys.exit(0 if r.status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Frontend (Next.js 16 standalone)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    image: ted-signal-frontend:${IMAGE_TAG:-latest}
    container_name: ted-signal-frontend
    restart: unless-stopped
    environment:
      # 서버사이드에서만 사용되는 백엔드 API base URL (내부 네트워크)
      BACKEND_INTERNAL_URL: http://backend:8000
      # 브라우저 노출용 — 역프록시 뒤에 있으면 "/" 로 두고 Nginx 에서 /api 를 backend 로 라우팅
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      TZ: Asia/Seoul
    depends_on:
      backend:
        condition: service_healthy
    # 외부 노출 없음 — 브라우저는 caddy 를 통해서만 접근
    networks:
      - backend-net

  # ---------------------------------------------------------------------------
  # Caddy (Reverse Proxy + 자동 TLS)
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: ted-signal-caddy
    restart: unless-stopped
    environment:
      # DOMAIN=localhost → internal CA (self-signed), 실도메인 → Let's Encrypt
      DOMAIN: ${DOMAIN:-localhost}
      # ACME_EMAIL=internal → Caddy `tls internal` (self-signed). 실도메인 시 실제 이메일로 오버라이드
      ACME_EMAIL: ${ACME_EMAIL:-internal}
      TZ: Asia/Seoul
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3 (QUIC)
    volumes:
      - ./ops/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data        # 인증서, ACME 계정 키, 세션
      - caddy-config:/config    # 자동 생성 설정/오토세이브
    depends_on:
      - frontend
    networks:
      - backend-net
    healthcheck:
      # Caddy admin API(2019, 내부 전용)로 프로세스 활성 확인 — 인증서 검증 우회 불필요
      test: ["CMD", "wget", "-qO-", "http://localhost:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  backend-net:
    driver: bridge

volumes:
  signal-prod-data:
    name: ted-signal-prod-data
  caddy-data:
    name: ted-signal-caddy-data
  caddy-config:
    name: ted-signal-caddy-config
