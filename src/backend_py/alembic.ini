[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os

# DB URL 은 migrations/env.py 가 Settings 에서 동적으로 주입. 이 값은 폴백일 뿐.
sqlalchemy.url = postgresql+psycopg2://signal:signal@localhost:5432/signal_db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
