spring:
  application:
    name: signal-backend

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/signal_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: public
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

  jackson:
    time-zone: Asia/Seoul
    date-format: yyyy-MM-dd

server:
  port: 8080

logging:
  level:
    com.ted.signal: DEBUG
    org.hibernate.SQL: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

---
spring:
  config:
    activate:
      on-profile: local
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
