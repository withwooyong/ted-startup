# =============================================================================
# CI — master 푸시 / PR 시 백엔드 lint/test + 프론트 빌드 + 이미지 빌드
# -----------------------------------------------------------------------------
# - backend-lint : ruff check + ruff format --check + mypy app (strict)
# - backend-test : Python 3.12 + uv + pytest (Testcontainers PG16)
# - frontend-build : npm ci + next build (standalone 산출물 점검)
# - docker-build : 두 이미지 빌드 + SHA 태그 (레지스트리 푸시는 미정)
# =============================================================================

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1) Backend Lint: ruff (check + format) + mypy strict
  #    - pytest 보다 1~2초 내 빠르게 실패 신호 제공
  #    - mypy 범위는 app/ 만 (tests/scripts 는 strict 미적용 — 추후 확대 후보)
  # ---------------------------------------------------------------------------
  backend-lint:
    name: Backend Lint (ruff + mypy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend_py

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: src/backend_py/uv.lock

      - name: Install dependencies (dev extras for ruff/mypy)
        run: uv sync --frozen --extra dev

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format --check
        run: uv run ruff format --check .

      - name: mypy app (strict)
        run: uv run mypy app

  # ---------------------------------------------------------------------------
  # 2) Backend: Python pytest (Testcontainers 로 PG16 띄움)
  # ---------------------------------------------------------------------------
  backend-test:
    name: Backend Test (Python + pytest)
    runs-on: ubuntu-latest
    needs: [backend-lint]
    defaults:
      run:
        working-directory: src/backend_py

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: src/backend_py/uv.lock

      - name: Install dependencies (dev extras for pytest/testcontainers)
        run: uv sync --frozen --extra dev

      - name: Run pytest
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: uv run pytest -q

      - name: Upload pytest cache on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-pytest-cache
          path: src/backend_py/.pytest_cache
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 2) Frontend: Next.js 빌드
  # ---------------------------------------------------------------------------
  frontend-build:
    name: Frontend Build (Next.js 16)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint --if-present
        continue-on-error: true

      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

      - name: Upload .next/standalone artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-standalone-${{ github.sha }}
          path: |
            src/frontend/.next/standalone
            src/frontend/.next/static
          retention-days: 3

  # ---------------------------------------------------------------------------
  # 3) Docker: 두 이미지 빌드 (푸시 없음 — 검증 목적)
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build (backend + frontend)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "backend_tag=ted-signal-backend:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "frontend_tag=ted-signal-frontend:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./src/backend_py
          file: ./src/backend_py/Dockerfile
          push: false
          load: true
          tags: |
            ${{ steps.meta.outputs.backend_tag }}
            ted-signal-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./src/frontend
          file: ./src/frontend/Dockerfile
          push: false
          load: true
          tags: |
            ${{ steps.meta.outputs.frontend_tag }}
            ted-signal-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Show built images
        run: docker image ls | grep ted-signal || true
