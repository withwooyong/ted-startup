# =============================================================================
# CI — master 푸시 / PR 시 백엔드 테스트 + 프론트 빌드 + 이미지 빌드
# -----------------------------------------------------------------------------
# - backend-test : Gradle + Testcontainers (docker socket 필요)
# - frontend-build : npm ci + next build (standalone 산출물 점검)
# - docker-build : 두 이미지 빌드 + SHA 태그 (레지스트리 푸시는 미정)
# =============================================================================

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1) Backend: Gradle 테스트
  # ---------------------------------------------------------------------------
  backend-test:
    name: Backend Test (Gradle + Testcontainers)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle (with build cache)
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run tests
        env:
          # Testcontainers 는 ubuntu-latest 의 docker 데몬을 그대로 사용
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: ./gradlew --no-daemon test

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: src/backend/build/reports/tests/test
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 2) Frontend: Next.js 빌드
  # ---------------------------------------------------------------------------
  frontend-build:
    name: Frontend Build (Next.js 16)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint --if-present
        continue-on-error: true

      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

      - name: Upload .next/standalone artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-standalone-${{ github.sha }}
          path: |
            src/frontend/.next/standalone
            src/frontend/.next/static
          retention-days: 3

  # ---------------------------------------------------------------------------
  # 3) Docker: 두 이미지 빌드 (푸시 없음 — 검증 목적)
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build (backend + frontend)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "backend_tag=ted-signal-backend:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "frontend_tag=ted-signal-frontend:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./src/backend
          file: ./src/backend/Dockerfile
          push: false
          load: true
          tags: |
            ${{ steps.meta.outputs.backend_tag }}
            ted-signal-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./src/frontend
          file: ./src/frontend/Dockerfile
          push: false
          load: true
          tags: |
            ${{ steps.meta.outputs.frontend_tag }}
            ted-signal-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Show built images
        run: docker image ls | grep ted-signal || true
